name: CI

on:
  push:
    branches: ["main", "claude/**", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: panc_test
          POSTGRES_USER: pancuser
          POSTGRES_PASSWORD: pancpass_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgis://pancuser:pancpass_ci@localhost:5432/panc_test
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_NAME: panc_test
      DB_USER: pancuser
      DB_PASSWORD: pancpass_ci
      DB_HOST: localhost
      DB_PORT: "5432"
      CORS_ALLOW_ALL_ORIGINS: "True"
      PLANTNET_API_KEY: ""
      PLANTID_API_KEY: ""
      MAPBIOMAS_TOKEN: ""
      NASA_FIRMS_MAP_KEY: ""
      LOCATIONIQ_TOKEN: ""
      INMET_TOKEN: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (GDAL)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gdal-bin libgdal-dev python3-gdal

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_core.txt

      - name: Wait for PostgreSQL + PostGIS
        run: |
          until pg_isready -h localhost -p 5432 -U pancuser; do
            echo "Waiting for database..."
            sleep 2
          done

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ mapping/tests.py \
            --cov=mapping \
            --cov-report=term-missing \
            --cov-report=xml \
            -v \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: |
          flake8 mapping/ config/ tests/ \
            --max-line-length=120 \
            --exclude=mapping/migrations/,__pycache__ \
            --count --statistics

  mobile-test:
    name: Mobile Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci
      - name: Run Jest tests
        working-directory: mobile
        run: npm run test:ci
