{% extends "mapping/base.html" %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Remover Ponto</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #fbe9e7;
            text-align: center;
            padding: 2rem;
        }
        .box {
            background: #fff;
            padding: 2.5rem 2rem 2rem 2rem;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 18px rgba(44, 62, 80, 0.09);
            min-width: 320px;
            max-width: 98vw;
        }
        h2 {
            color: #d32f2f;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }
        p {
            margin-bottom: 2rem;
            font-size: 1.15rem;
        }
        .ponto-nome {
            color: #388e3c;
            font-weight: bold;
        }
        button {
            background-color: #d32f2f;
            color: #fff;
            padding: 0.7rem 2.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 1.2rem;
            font-size: 1rem;
            transition: background 0.15s;
        }
        button:hover {
            background-color: #b71c1c;
        }
        a {
            color: #00796b;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 0.7rem 1.5rem;
            border-radius: 5px;
            transition: background 0.12s;
        }
        a:hover {
            background: #eceff1;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Confirmar Remoção</h2>
        <p>
            Tem certeza que deseja remover o ponto
            <span class="ponto-nome">
                {{ ponto.planta.nome_popular|default:"Sem identificação" }}
            </span>
            ?
        </p>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Sim, remover</button>
            <a href="{% url 'mapa' %}">Cancelar</a>
        </form>
    </div>
</body>
</html>
