{% extends "mapping/base.html" %}

{% block title %}Criar Missăo{% endblock %}

{% block content %}
<div class="container py-4">
    <h2>Criar Missăo</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-2">
            <label>Título</label>
            <input type="text" name="titulo" class="form-control" required>
        </div>
        <div class="mb-2">
            <label>Descriçăo</label>
            <textarea name="descricao" class="form-control" required></textarea>
        </div>
        <div class="mb-2">
            <label>Tipo</label>
            <select name="tipo" class="form-select" required>
                <option value="diaria">Diária</option>
                <option value="semanal">Semanal</option>
                <option value="especial">Especial</option>
            </select>
        </div>
        <div class="mb-2">
            <label>Pontos</label>
            <input type="number" name="pontos" class="form-control" required min="1">
        </div>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" name="ativa" id="ativaNovaMissao" checked>
            <label class="form-check-label" for="ativaNovaMissao">Missăo ativa</label>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-success">Criar</button>
        </div>
    </form>
</div>
{% endblock %}
